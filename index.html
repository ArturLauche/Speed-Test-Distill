   // You can pass "Clean" or "C" as a URL Parameter and reset the Overhead Compensation factor to Zero or set any value between 0 and 4. 1 = 1% to 4 = 4%

        var enableClean = true;

    // Longer runs improve accuracy on high-speed links when each transfer chunk is small.
        var dlDuration = 25;
        var ulDuration = 25;

    // 6 is a common browser limit per host, but modern stacks can pipeline/multiplex more.
    // Choose  Number for parallel HTTP connections to Server | Default is 6 
        var dlThreads = 12;
        var ulThreads = 12;
